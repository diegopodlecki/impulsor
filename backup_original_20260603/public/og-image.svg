<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#22C55E" />
    </linearGradient>
    <radialGradient id="glow1" cx="22%" cy="20%" r="58%">
      <stop stop-color="#3B82F6" stop-opacity="0.22" />
      <stop offset="1" stop-color="#000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="60%" r="58%">
      <stop stop-color="#22C55E" stop-opacity="0.18" />
      <stop offset="1" stop-color="#000" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow1)" />
  <rect width="1200" height="630" fill="url(#glow2)" />

  <g transform="translate(86 88)">
    <rect x="0" y="0" width="120" height="120" rx="36" fill="#0f172a" stroke="url(#accent)" stroke-width="6" />
    <path d="M74 16 34 74h34l-8 48 40-58H66l8-48Z" fill="url(#accent)" />
  </g>

  <g transform="translate(240 120)">
    <text x="0" y="74" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff">
      WebApp<tspan fill="#3B82F6">Impulsor</tspan>
    </text>
    <text x="0" y="136" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="32" font-weight="600" fill="#cbd5e1">
      Webs por rubro que generan clientes, consultas y ventas.
    </text>
    <text x="0" y="186" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="24" font-weight="500" fill="#94a3b8">
      Landing pages + Supabase + WhatsApp en una sola propuesta.
    </text>
  </g>

  <g transform="translate(80 360)">
    <rect x="0" y="0" width="1040" height="160" rx="30" fill="#0f172a" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.08" />
    <text x="36" y="58" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">
      Gimnasios, entrenadores, nutricionistas, psicólogos y estética corporal
    </text>
    <text x="36" y="104" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="22" font-weight="500" fill="#cbd5e1">
      Una web clara, orientada a resultados y lista para convertir mejor desde el primer clic.
    </text>
    <rect x="36" y="122" width="220" height="14" rx="7" fill="url(#accent)" />
  </g>

  <g filter="url(#soft)" opacity="0.95">
    <circle cx="1010" cy="110" r="52" fill="#3B82F6" fill-opacity="0.25" />
    <circle cx="1090" cy="200" r="76" fill="#22C55E" fill-opacity="0.18" />
    <circle cx="960" cy="250" r="42" fill="#3B82F6" fill-opacity="0.18" />
  </g>
