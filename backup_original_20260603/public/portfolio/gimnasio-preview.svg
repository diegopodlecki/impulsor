<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#gradOrange)"/>
  
  <!-- Barbell icon -->
  <g transform="translate(300, 200)">
    <!-- Plates -->
    <rect x="0" y="35" width="15" height="30" fill="#fff" rx="2"/>
    <rect x="185" y="35" width="15" height="30" fill="#fff" rx="2"/>
    <rect x="10" y="30" width="10" height="40" fill="#fbbf24" rx="2"/>
    <rect x="180" y="30" width="10" height="40" fill="#fbbf24" rx="2"/>
    <!-- Bar -->
    <rect x="25" y="45" width="150" height="10" fill="#475569" rx="2"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="380" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Gimnasio
  </text>
  <text x="400" y="440" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial">
    Transformación física y salud
  </text>
</svg>