name: Deploy to Hostinger (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Ensure Hostinger-required files (PHP backend + .htaccess) exist in dist/
      - name: Prepare dist for Hostinger
        run: |
          cp -f hostinger/public_html/.htaccess dist/.htaccess
          cp -f hostinger/public_html/enviar.php dist/enviar.php
          cp -f hostinger/public_html/config.php dist/config.php

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: dist/
          server-dir: /public_html/
          dangerous-clean-slate: true

