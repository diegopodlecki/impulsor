name: Deploy to Hostinger (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  # GitHub comenzará a forzar Node.js 24 para JavaScript actions (jun 2026).
  # Opt-in ahora para evitar deprecations y sorpresas.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: dist/
          server-dir: /public_html/
          # Dist is the single deploy artifact; no extra Hostinger-specific build step.
          dangerous-clean-slate: true


