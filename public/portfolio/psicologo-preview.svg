<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b21a8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#gradPurple)"/>
  
  <!-- Brain icon -->
  <g transform="translate(340, 180)">
    <circle cx="60" cy="40" r="25" fill="#fff" opacity="0.9"/>
    <circle cx="40" cy="60" r="20" fill="#fff" opacity="0.9"/>
    <circle cx="80" cy="60" r="20" fill="#fff" opacity="0.9"/>
    <path d="M 60 40 Q 45 55 40 80" stroke="#fff" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M 60 40 Q 75 55 80 80" stroke="#fff" stroke-width="3" fill="none" opacity="0.7"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="380" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Psicólogo
  </text>
  <text x="400" y="440" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial">
    Escucha profesional y confianza
  </text>
</svg>