<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#gradIndigo)"/>
  
  <!-- Rocket icon -->
  <g transform="translate(330, 150)">
    <!-- Rocket body -->
    <rect x="45" y="20" width="30" height="60" fill="#fff" rx="5"/>
    <!-- Nose cone -->
    <polygon points="60,20 50,5 70,5" fill="#ff6b6b"/>
    <!-- Flames -->
    <polygon points="50,80 60,100 70,80" fill="#fbbf24"/>
    <polygon points="55,85 60,95 65,85" fill="#ff6b6b"/>
    <!-- Windows -->
    <circle cx="60" cy="35" r="3" fill="#4f46e5"/>
    <circle cx="60" cy="50" r="3" fill="#4f46e5"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="400" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Emprendedor
  </text>
  <text x="400" y="460" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial">
    Tu idea hecha realidad digital
  </text>
</svg>