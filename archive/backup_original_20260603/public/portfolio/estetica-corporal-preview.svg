<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#db2777;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#gradPink)"/>
  
  <!-- Spa/Beauty icon -->
  <g transform="translate(340, 180)">
    <!-- Flower -->
    <circle cx="60" cy="50" r="12" fill="#fff" opacity="0.9"/>
    <circle cx="45" cy="40" r="8" fill="#fbbf24" opacity="0.9"/>
    <circle cx="75" cy="40" r="8" fill="#fbbf24" opacity="0.9"/>
    <circle cx="45" cy="60" r="8" fill="#fbbf24" opacity="0.9"/>
    <circle cx="75" cy="60" r="8" fill="#fbbf24" opacity="0.9"/>
    <circle cx="60" cy="75" r="8" fill="#fbbf24" opacity="0.9"/>
    <circle cx="60" cy="50" r="5" fill="#fbbf24"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="380" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Estética Corporal
  </text>
  <text x="400" y="440" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial">
    Belleza, lujo y bienestar
  </text>
</svg>