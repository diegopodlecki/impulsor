<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#gradGreen)"/>
  
  <!-- Apple icon -->
  <g transform="translate(340, 180)">
    <circle cx="60" cy="60" r="35" fill="#ff6b6b"/>
    <path d="M 60 20 Q 65 15 70 20" fill="#4ade80"/>
    <ellipse cx="55" cy="40" rx="15" ry="18" fill="#ff8a8a"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="380" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Nutricionista
  </text>
  <text x="400" y="440" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial">
    Salud y bienestar nutricional
  </text>
</svg>